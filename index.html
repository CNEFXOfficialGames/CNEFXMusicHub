<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CNEFX Hub</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #dff6ff, #ffffff);
    color: #111;
    text-align: center;
  }

  header {
    padding: 60px 20px 20px;
  }

  h1 {
    margin: 0;
    font-size: 42px;
  }

  .card {
    max-width: 700px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  button {
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
  }

  .song-btn {
    width: 100%;
    background: #f2f2f2;
  }

  .song-btn:hover {
    background: #ddd;
  }

  /* ACCOUNT BUTTON */
  .account {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #ccc;
    cursor: pointer;
    display: none;
  }

  .account img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* DROPDOWN */
  .dropdown {
    position: fixed;
    top: 65px;
    right: 15px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    display: none;
    flex-direction: column;
    min-width: 150px;
  }

  .dropdown button {
    background: white;
    border: none;
    padding: 10px;
    text-align: left;
    cursor: pointer;
  }

  .dropdown button:hover {
    background: #f2f2f2;
  }
</style>
</head>

<body>

<header>
  <h1>🎮 CNEFX Hub</h1>
  <p>Games + Music Player</p>
</header>

<!-- 👤 ACCOUNT -->
<div class="account" id="accountBtn">
  <img id="pfp">
</div>

<div class="dropdown" id="dropdown">
  <button onclick="location.href='profile.html'">My Profile</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- 🎵 MUSIC -->
<div class="card">
  <h2>🎧 Music Player</h2>

  <audio id="player" controls style="width:100%;"></audio>

  <div id="songs"></div>
</div>

<script>
/* ================= USER ================= */
const user = JSON.parse(localStorage.getItem("user") || "null");

const accBtn = document.getElementById("accountBtn");
const pfp = document.getElementById("pfp");
const dropdown = document.getElementById("dropdown");

if (user) {
  accBtn.style.display = "block";
  pfp.src = user.photo || "https://via.placeholder.com/40";

  accBtn.onclick = () => {
    dropdown.style.display =
      dropdown.style.display === "flex" ? "none" : "flex";
  };
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

window.addEventListener("click", (e) => {
  if (!accBtn.contains(e.target)) {
    dropdown.style.display = "none";
  }
});

/* ================= MUSIC ================= */
const songs = [
  { name: "Song 1", file: "music/song1.mp3" },
  { name: "Song 2", file: "music/song2.mp3" },
  { name: "Song 3", file: "music/song3.mp3" }
];

const player = document.getElementById("player");
const songsDiv = document.getElementById("songs");

function playSong(song) {
  player.src = song.file;
  player.play();
}

songs.forEach(s => {
  const btn = document.createElement("button");
  btn.className = "song-btn";
  btn.textContent = "▶ " + s.name;

  btn.onclick = () => playSong(s);

  songsDiv.appendChild(btn);
});
</script>

</body>
</html>

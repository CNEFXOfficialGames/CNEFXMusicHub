<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Music Player</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
  }

  header {
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    background: #1f1f1f;
  }

  .container {
    display: flex;
    height: calc(100vh - 70px);
  }

  .playlist {
    width: 300px;
    background: #181818;
    overflow-y: auto;
    padding: 10px;
  }

  .song {
    padding: 10px;
    margin: 6px 0;
    background: #242424;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }

  .song:hover {
    background: #333;
  }

  .song.active {
    background: #1db954;
    color: black;
    font-weight: bold;
  }

  .player {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .controls button {
    margin: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
  }

  .play { background: #1db954; }
  .pause { background: #ff4d4d; color: white; }
  .next { background: #333; color: white; }

  audio {
    margin-top: 20px;
    width: 300px;
  }
</style>
</head>

<body>

<header>🎵 My Music Player</header>

<div class="container">

  <div class="playlist" id="playlist"></div>

  <div class="player">
    <h2 id="title">Select a song</h2>

    <div class="controls">
      <button class="play" onclick="playSong()">Play</button>
      <button class="pause" onclick="pauseSong()">Pause</button>
      <button class="next" onclick="nextSong()">Next</button>
    </div>

    <audio id="audio" controls></audio>
  </div>

</div>

<script>
/* 🎧 YOUR REAL SONG */
const songs = [
  {
    name: "Just Listen",
    file: "music/listen.mp3"
  }
];

let currentIndex = 0;

const playlist = document.getElementById("playlist");
const audio = document.getElementById("audio");
const title = document.getElementById("title");

/* render playlist */
function render() {
  playlist.innerHTML = "";

  songs.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "song";
    div.textContent = s.name;

    div.onclick = () => loadSong(i);

    playlist.appendChild(div);
  });

  updateActive();
}

function loadSong(i) {
  currentIndex = i;
  audio.src = songs[i].file;
  title.textContent = songs[i].name;
  audio.play();
  updateActive();
}

function updateActive() {
  document.querySelectorAll(".song").forEach((el, i) => {
    el.classList.toggle("active", i === currentIndex);
  });
}

function playSong() {
  audio.play();
}

function pauseSong() {
  audio.pause();
}

function nextSong() {
  currentIndex = (currentIndex + 1) % songs.length;
  loadSong(currentIndex);
}

render();
</script>

</body>
</html>
